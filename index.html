<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card-flip { perspective: 1000px; height: 100%; width: 100%; }
        .card-inner { transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; height: 100%; width: 100%; position: relative; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 40px; padding: 2rem; pointer-events: none; }
        .card-back { transform: rotateY(180deg); }
        .sticky-header { z-index: 200 !important; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: sticky; top: 0; }
        .lesson-active, .type-active, .active-new-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
        .note-active { background-color: #f97316 !important; color: white !important; border-color: #f97316 !important; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; overflow-x: auto; display: flex; gap: 0.5rem; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; white-space: nowrap; scroll-behavior: smooth; }
        #input-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        #input-section.show { max-height: 2000px; opacity: 1; margin-bottom: 1.5rem; }
        .active-audio-card { border-color: #f97316 !important; background-color: #fffaf7 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans text-slate-900" onclick="window.initAudioOnFirstClick()">

    <div id="toast" class="fixed z-[1000] left-1/2 bottom-20 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full hidden font-bold shadow-lg text-sm">✅ 操作成功</div>

    <div class="sticky-header border-b border-slate-200">
        <div class="max-w-md mx-auto px-4 pt-3 pb-2">
            <div class="flex gap-2 mb-2">
                <button id="toggle-filter-btn" onclick="window.toggleFilterPanel()" class="bg-indigo-600 text-white px-4 rounded-2xl text-[12px] font-bold shadow-sm h-[42px] shrink-0">顯示篩選</button>
                <input type="text" id="searchInput" oninput="window.renderList()" placeholder="🔍 搜尋多益單字庫..." class="flex-1 p-3 rounded-2xl bg-white border border-slate-200 outline-none text-sm shadow-inner">
                <button id="sort-btn" onclick="window.toggleSort()" class="bg-white border border-slate-200 px-4 rounded-2xl text-[13px] font-bold text-slate-400 shadow-sm">排序↑</button>
            </div>
            <div id="filter-panel" class="hidden bg-slate-100 p-3 rounded-2xl border border-slate-200 mb-3 space-y-2">
                <div id="az-filter" class="no-scrollbar"></div>
                <div id="type-filter" class="no-scrollbar"></div>
                <div id="tag-filter" class="no-scrollbar"></div>
            </div>
            <div class="flex gap-2 mb-2">
                <button id="book1-btn" onclick="window.switchBook(1)" class="flex-1 border py-2 rounded-xl text-xs font-bold">核心字彙</button>
                <button id="book2-btn" onclick="window.switchBook(2)" class="flex-1 border py-2 rounded-xl text-xs font-bold">進階商務</button>
                <button id="book-note-btn" onclick="window.switchBook('note')" class="flex-1 border py-2 rounded-xl text-xs font-bold">個人筆記</button>
            </div>
            <div class="no-scrollbar pb-2" id="lesson-filter-container"></div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <button onclick="window.openNewWordPanel()" class="mb-4 bg-indigo-50 text-indigo-600 px-6 py-2.5 rounded-full text-sm font-bold border border-indigo-100 w-full shadow-sm">＋ 新增多益單字</button>
        <section id="input-section" class="bg-white rounded-3xl p-5 border border-slate-200 shadow-sm transition-all overflow-hidden text-center">
            <button id="submit-btn" onclick="window.submitNewWord()" class="w-3/4 mx-auto bg-slate-900 text-white py-3 rounded-2xl font-bold shadow-xl block text-sm">儲存到單字冊</button>
        </section>
        <ul id="vocab-list" class="space-y-3"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ... (保持原有的 Firebase Config)
        const db = getFirestore(initializeApp({ /* ... */ }));
        const vocabsCol = collection(db, "toeic_vocabs");

        // --- 核心定義區 ---
        window.BOOK_MAP = {
            1: ["0-2k", "2-5k", "TOEIC", "個人筆記", "進階商務"],
            2: ["一般商務", "辦公行政", "金融預算", "行銷銷售", "科技研發", "生產工廠"]
        };
        window.LESSON_TYPES = ['n.', 'pron.', 'v.', 'adv.', 'adj.', 'prep.', 'conj.', 'det.', 'int.', 'num', 'phr.', 'abbr.'];
        window.SITUATION_TAGS = ['人資招募', '商務合約', '財務金融', '行銷銷售', '行政辦公'];
        window.AZ_LIST = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        window.currentUser = localStorage.getItem('toeic_user_shared') || '訪客';

        // --- 篩選面板邏輯 ---
        window.toggleFilterPanel = () => {
            const panel = document.getElementById("filter-panel");
            const btn = document.getElementById("toggle-filter-btn");
            const isHidden = panel.classList.toggle("hidden");
            btn.innerText = isHidden ? "顯示篩選" : "隱藏篩選";
            if(!isHidden) window.renderFilters();
        };

        window.renderFilters = () => {
            const activeLesson = window.selectedLessons[0];
            const azCont = document.getElementById("az-filter");
            azCont.innerHTML = '<span class="text-[10px] text-slate-400 font-bold mr-2">A-Z:</span>';
            if(activeLesson && activeLesson !== "進階商務") {
                window.AZ_LIST.forEach(char => {
                    const btn = document.createElement("button");
                    btn.className = "px-2 py-1 text-[10px] border rounded-lg mr-1 bg-white";
                    btn.innerText = char;
                    azCont.appendChild(btn);
                });
            }
            // 詞性與標籤邏輯相同方式渲染
        };

        // --- 帳號隔離邏輯 (第 6 點) ---
        window.submitNewWord = async () => {
            // ... (取得輸入值 w, m 等邏輯)
            await addDoc(vocabsCol, {
                // ... (其他欄位)
                owner: (window.newWordBook === 'note') ? window.currentUser : 'public'
            });
            window.showToast("儲存成功");
        };

        window.renderList = () => {
            // 權限隔離過濾
            let filtered = window.vocabs.filter(v => {
                if (v.book === 'note' && v.owner && v.owner !== window.currentUser) return false;
                return true;
            });
            // ... (執行後續渲染)
        };

        // --- 電腦端拖曳滑動 ---
        const initDesktopDragScroll = () => {
            const sliders = document.querySelectorAll('.no-scrollbar');
            sliders.forEach(slider => {
                let isDown = false; let startX; let scrollLeft;
                slider.addEventListener('mousedown', (e) => { isDown = true; slider.style.cursor = 'grabbing'; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
                slider.addEventListener('mouseleave', () => { isDown = false; slider.style.cursor = ''; });
                slider.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = ''; });
                slider.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); slider.scrollLeft = scrollLeft - (e.pageX - slider.offsetLeft - startX) * 2; });
            });
        };
        initDesktopDragScroll();
    </script>
</body>
</html>
