<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; overflow-x: auto; display: flex; gap: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans text-slate-900">
    <div id="toast" class="fixed z-[1000] left-1/2 bottom-[100px] -translate-x-1/2 bg-[#333] text-white px-4 py-3 rounded-full font-bold shadow-lg opacity-0 transition-opacity duration-300">✅ 操作成功</div>

    <div class="sticky-header border-b border-slate-200 bg-white/95 backdrop-blur">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex items-center mb-3">
                <div class="flex items-center gap-1.5 no-scrollbar flex-1" id="user-history-list"></div>
                <button onclick="window.toggleManualSort()" class="ml-2 text-[11px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md font-bold">手動排序</button>
            </div>
            <div class="flex gap-2 mb-2">
                <button id="book-0-2k-btn" onclick="window.switchBook('0-2k')" class="border py-2 px-3 rounded-xl text-xs font-bold">0-2k</button>
                <button id="book-2-5k-btn" onclick="window.switchBook('2-5k')" class="border py-2 px-3 rounded-xl text-xs font-bold">2-5k</button>
                <button id="book-toeic-btn" onclick="window.switchBook('TOEIC')" class="border py-2 px-3 rounded-xl text-xs font-bold">TOEIC</button>
                <button id="book2-btn" onclick="window.switchBook(2)" class="border py-2 px-3 rounded-xl text-xs font-bold">進階商務</button>
                <button id="book-note-btn" onclick="window.switchBook('note')" class="border py-2 px-3 rounded-xl text-xs font-bold">個人筆記</button>
            </div>
            <div id="dynamic-filter-group" class="hidden">
                <div class="no-scrollbar pb-2 w-full" id="lesson-filter-container"></div>
                <div id="type-filter" class="no-scrollbar pb-2 w-full"></div>
            </div>
            <div class="flex gap-2 mt-2">
                <button id="filter-toggle-btn" onclick="window.toggleFilterVisibility()" class="bg-white border px-3 rounded-2xl text-xs font-bold">👁️ 顯示篩選器</button>
                <input type="text" id="searchInput" oninput="window.renderList()" placeholder="🔍 搜尋..." class="flex-1 p-3 rounded-2xl bg-white border border-slate-200 text-sm">
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <button onclick="window.openNewWordPanel()" class="mb-4 bg-indigo-50 text-indigo-600 px-6 py-2.5 rounded-full text-sm font-bold w-full">＋ 新增多益單字</button>
        <ul id="vocab-list" class="space-y-3"></ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { /* 請放入你原本的 key */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        window.vocabs = []; window.userProgress = {}; window.currentBook = '0-2k';
        window.selectedLessons = []; window.selectedTypes = [];
        
        // 恢復所有功能變數
        let currentUser = localStorage.getItem('toeic_user_shared') || '訪客';
        const LESSON_TYPES = ['n.', 'pron.', 'v.', 'adv.', 'adj.', 'prep.', 'conj.', 'det.', 'int.', 'num', 'phr.', 'abbr.'];
        const BOOK_MAP = { '0-2k': "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""), '2-5k': "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""), 'TOEIC': "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""), 2: ["商務1", "商務2"], 'note': ["個人筆記"] };

        window.toggleFilterVisibility = () => {
            const g = document.getElementById("dynamic-filter-group");
            g.classList.toggle("hidden");
            document.getElementById("filter-toggle-btn").innerText = g.classList.contains("hidden") ? "👁️ 顯示篩選器" : "👁️ 隱藏篩選器";
        };

        window.switchBook = (b) => {
            window.currentBook = b;
            window.renderFilters();
            window.renderList();
        };

        window.renderList = () => {
            const listEl = document.getElementById("vocab-list");
            if(!listEl) return;
            listEl.innerHTML = "";
            // 這裡放你原本完整的 renderList 邏輯
            // 確保包含 v.uid === currentUser 判斷個人筆記
        };

        window.renderFilters = () => {
            // 這裡放你原本完整的 renderFilters 邏輯
        };

        // 必須確保初始化代碼在 DOMContentLoaded 內
        document.addEventListener("DOMContentLoaded", () => {
            db.collection("toeic_vocabs").orderBy("order").onSnapshot(snapshot => {
                window.vocabs = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
                window.renderFilters();
                window.renderList();
            });
            // 其他初始化
        });
    </script>
</body>
</html>
